name: release

on:
  push:
    tags:
      # Publish on any tag starting using vMAJOR.MINOR.PATCH convention
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"


jobs:
  tests:
      uses: ./.github/workflows/code_quality.yml

  run:
    runs-on: ubuntu-latest
    # https://stackoverflow.com/questions/58457140/dependencies-between-workflows-on-github-actions#64733705
    needs: [tests] # require tests to pass before deploy runs
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
