# lock -> ruff -> pyright
# Timnology :: https://youtu.be/Y6D2XaFV3Cc

name: "Python Code Quality"

on:
  push:
    branches: [master]
  workflow_call:

jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv lock --locked
  linting:
      runs-on: ubuntu-latest
      needs: [lock_file]
      steps:
        - uses: actions/checkout@v4
        - uses: ./.github/actions/setup
        - run: uvx ruff check . --diff
  formatting:
      runs-on: ubuntu-latest
      needs: [lock_file]
      steps:
        - uses: actions/checkout@v4
        - uses: ./.github/actions/setup
        - run: uvx ruff format . --diff
  type_consistency:
        runs-on: ubuntu-latest
        needs: [lock_file]
        steps:
          - uses: actions/checkout@v4
          - uses: ./.github/actions/setup
          - run: uv run pyright .
  tests:
      runs-on: ubuntu-latest
      needs: [lock_file]
      steps:
        - uses: actions/checkout@v4
        - uses: ./.github/actions/setup
        - run: uv run pytest -v --durations=0 --cov
  build:
    runs-on: ubuntu-latest
    needs: [linting, formatting, type_consistency, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv build
